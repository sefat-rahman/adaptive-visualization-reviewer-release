<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Visualization - OpenLayers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.6.1/ol.css">
  <link rel="stylesheet" href="static/style.css?v=20260601">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">Adaptive Visualization</div>
      <div class="brand-subtitle">Precomputed GitHub Pages viewer</div>
    </div>

    <div class="toolbar">
      <label>
        <span>Sampling</span>
        <select id="method-select">
          <option value="pixel">Pixel Occupancy</option>
          <option value="all">All Points</option>
          <option value="fps_threshold">FPS - Error Threshold</option>
          <option value="random">Random</option>
        </select>
      </label>

      <label>
        <span>Retain</span>
        <select id="retain-select">
          <option value="1">1%</option>
          <option value="3">3%</option>
          <option value="4">4%</option>
          <option value="5">5%</option>
          <option value="10">10%</option>
          <option value="15">15%</option>
          <option value="20">20%</option>
          <option value="25">25%</option>
          <option value="26">26%</option>
          <option value="30">30%</option>
          <option value="35">35%</option>
          <option value="40">40%</option>
          <option value="45">45%</option>
          <option value="50" selected>50%</option>
          <option value="55">55%</option>
          <option value="60">60%</option>
          <option value="65">65%</option>
          <option value="70">70%</option>
          <option value="75">75%</option>
          <option value="80">80%</option>
          <option value="85">85%</option>
          <option value="90">90%</option>
          <option value="95">95%</option>
          <option value="100">100%</option>
        </select>
      </label>

      <label>
        <span>Threshold</span>
        <select id="threshold-select">
          <option value="0.05">0.05</option>
          <option value="0.10">0.10</option>
          <option value="0.25">0.25</option>
          <option value="0.50" selected>0.50</option>
          <option value="0.75">0.75</option>
          <option value="1.00">1.00</option>
        </select>
      </label>

      <label>
        <span>Baseline</span>
        <select id="topology-baseline-select">
          <option value="country_1pct_distance">Country 1% distance</option>
          <option value="county_10pct_distance">County 10% distance</option>
          <option value="county_20pct_distance" selected>County 20% distance</option>
        </select>
      </label>

      <label>
        <span>Analysis</span>
        <select id="analysis-select">
          <option value="statistical">Statistical</option>
          <option value="density">Density</option>
          <option value="topological">Topological</option>
        </select>
      </label>

      <button id="back-btn" type="button" disabled>&larr; Back</button>
    </div>
  </header>

  <main class="layout">
    <section class="map-panel">
      <div class="map-header">
        <div class="map-title-row">
          <div id="breadcrumb">Country</div>
          <button id="precompute-toggle-btn" class="precompute-toggle" type="button" hidden>
            Hide precomputed states
          </button>
        </div>
        <div id="view-caption">Country view</div>
      </div>
      <div id="map"></div>
      <div id="map-status">Loading map...</div>
    </section>

    <aside class="analysis-panel">
      <div class="analysis-header">
        <div id="analysis-title">Statistical Comparison</div>
        <div id="analysis-subtitle">Original vs reduced data</div>
      </div>
      <div id="analysis-content">
        <div class="analysis-placeholder">Loading analysis...</div>
      </div>
    </aside>
  </main>

  <script>
    window.reportExternalDependencyError = function (name) {
      var mapStatus = document.getElementById('map-status');
      var analysisTitle = document.getElementById('analysis-title');
      var analysisSubtitle = document.getElementById('analysis-subtitle');
      var analysisContent = document.getElementById('analysis-content');
      var message = name + ' failed to load from the CDN. Please refresh the page and check your internet connection.';
      if (mapStatus) {
        mapStatus.textContent = message;
      }
      if (analysisTitle) {
        analysisTitle.textContent = 'Dependency Error';
      }
      if (analysisSubtitle) {
        analysisSubtitle.textContent = 'The viewer could not load one of its frontend libraries.';
      }
      if (analysisContent) {
        analysisContent.innerHTML = '<div class="analysis-placeholder">' + message + '</div>';
      }
      console.error(message);
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/ol@v10.6.1/dist/ol.js" onerror="window.reportExternalDependencyError('OpenLayers')"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" onerror="window.reportExternalDependencyError('Plotly')"></script>

</body>
</html>
